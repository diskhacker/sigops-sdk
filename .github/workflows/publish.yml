name: Publish

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version intentionally omitted — resolved from the `packageManager`
        # field in root package.json. Avoids the "Multiple versions of pnpm
        # specified" error (see cluster-shared PR #6).
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test
      - name: Publish to npm (public)
        run: pnpm -r --filter='!@sigops/vscode-ext' publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

